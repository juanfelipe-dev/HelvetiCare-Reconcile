<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HomeCare Reconciliation</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<h1>Service Reconciliation</h1>
<form id="reconcile-form">
    <div class="dropzone" data-name="plan_file">
        <i>📁</i>
        <span class="drop-text">Click or drop plan file here</span>
        <input type="file" name="plan_file" required>
    </div>
    <div class="dropzone" data-name="actual_file">
        <i>📁</i>
        <span class="drop-text">Click or drop actual file here</span>
        <input type="file" name="actual_file" required>
    </div>
    <div class="dropzone" data-name="prescription_file">
        <i>📁</i>
        <span class="drop-text">Click or drop prescription file here</span>
        <input type="file" name="prescription_file" required>
    </div>
    <div>
        <label><input type="checkbox" name="download" id="download"> Download Excel report</label>
    </div>
    <button type="submit">Reconcile</button>
</form>
<div id="result-container"></div>

<script>
const form = document.getElementById('reconcile-form');
const resultContainer = document.getElementById('result-container');

// initialize dropzones
function setupDropzones() {
    document.querySelectorAll('.dropzone').forEach(zone => {
        const input = zone.querySelector('input[type=file]');
        const text = zone.querySelector('.drop-text');
        zone.addEventListener('click', () => input.click());
        zone.addEventListener('dragover', e => {
            e.preventDefault();
            zone.classList.add('dragover');
        });
        zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
        zone.addEventListener('drop', e => {
            e.preventDefault();
            zone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                input.files = e.dataTransfer.files;
                text.textContent = input.files[0].name;
            }
        });
        input.addEventListener('change', () => {
            if (input.files.length) text.textContent = input.files[0].name;
        });
    });
}

setupDropzones();

function renderTable(title, data) {
    if (!Array.isArray(data) || data.length === 0) return '';
    const cols = Object.keys(data[0]);
    let html = `<h2>${title}</h2><table class="result-table"><thead><tr>`;
    cols.forEach(c => html += `<th>${c.replace(/_/g, ' ')}</th>`);
    html += `</tr></thead><tbody>`;
    data.forEach(row => {
        html += '<tr>';
        cols.forEach(c => html += `<td>${row[c] !== undefined ? row[c] : ''}</td>`);
        html += '</tr>';
    });
    html += '</tbody></table>';
    return html;
}

form.addEventListener('submit', async (e) => {
    e.preventDefault();
    resultContainer.innerHTML = '<p>Processing...</p>';
    const data = new FormData(form);
    const useDownload = document.getElementById('download').checked;
    let url = '/reconcile';
    if (useDownload) {
        url += '?download=true';
    }
    const resp = await fetch(url, { method: 'POST', body: data });
    if (useDownload) {
        const blob = await resp.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'report.xlsx';
        document.body.appendChild(a);
        a.click();
        a.remove();
        resultContainer.innerHTML = '<p>Download started.</p>';
    } else {
        const json = await resp.json();
        // build tables
        let html = '';
        if (json.summary) {
            html += '<h2>Summary</h2><ul>';
            Object.entries(json.summary).forEach(([k,v]) => {
                html += `<li>${k.replace(/_/g,' ')}: ${v}</li>`;
            });
            html += '</ul>';
        }
        html += renderTable('Discrepancies', json.discrepancies || []);
        html += renderTable('Prescription Statuses', json.prescription_statuses || []);
        resultContainer.innerHTML = html || '<p>No results.</p>';
    }
});
</script>
<footer>
    &copy; 2026 HomeCare Reconciliation Tool
</footer>
</body>
</html>
